kind = "web"
previewPath = "/"
title = "ESMS Builder"
version = "1.0.0"
id = "artifacts/esms-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25625

[services.development]
run = "pnpm --filter @workspace/esms-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/esms-builder", "run", "build" ]
publicDir = "artifacts/esms-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25625"
BASE_PATH = "/"
